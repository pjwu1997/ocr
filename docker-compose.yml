services:
  web-app:
    image: nvidia/cuda:12.8.0-runtime-ubuntu22.04
    container_name: ocr-web-app
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PATH=/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VIRTUAL_ENV=/venv
    volumes:
      - /home/asiamath/.venv_vllm:/venv
      - /home/asiamath/.local/share/uv:/home/asiamath/.local/share/uv
      - /home/asiamath/Users/PJ/ocr:/app
      - /home/asiamath/.cache:/root/.cache
    working_dir: /app
    command: ["bash", "-c", "source /venv/bin/activate && python app.py"]
    depends_on:
      qwen-llm-server:
        condition: service_healthy

  qwen-llm-server:
    image: vllm/vllm-openai:latest
    container_name: qwen-llm-server
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
    ports:
      - "8010:8000"
    volumes:
      - /home/asiamath/.cache/huggingface:/root/.cache/huggingface
    shm_size: "16g"
    command: >
      --model QuantTrio/Qwen3.5-27B-AWQ
      --served-model-name qwen3.5-27b
      --max-model-len 8192
      --max-num-seqs 4
      --gpu-memory-utilization 0.9
      --trust-remote-code
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 600s

  gradio-app:
    image: nvidia/cuda:12.8.0-runtime-ubuntu22.04
    container_name: ocr-gradio-app
    restart: always
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PATH=/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VIRTUAL_ENV=/venv
    volumes:
      - /home/asiamath/.venv_vllm:/venv
      - /home/asiamath/.local/share/uv:/home/asiamath/.local/share/uv
      - /home/asiamath/Users/PJ/ocr:/app
      - /home/asiamath/.cache:/root/.cache
    working_dir: /app
    command: ["bash", "-c", "source /venv/bin/activate && python gradio_app.py"]
    depends_on:
      - web-app
